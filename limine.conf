timeout: 0
default_entry: 0

# Helps debug boot issues in QEMU: prints Limine logs to the UEFI serial device.
serial: yes
verbose: yes

# Only affects the Limine menu/terminal UI, not the booted OS.
interface_resolution: 1920x1080

/TRUEOS
protocol: limine
kernel_path: boot():/TRUEOS.elf

# Installer helper modules (so the kernel can copy these bytes to a target disk).
module_path: boot():/TRUEOS.elf
module_string: trueos.install.kernel
module_path: boot():/EFI/BOOT/BOOTX64.EFI
module_string: trueos.install.bootx64
