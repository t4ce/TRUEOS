timeout: 0
default_entry: 0
serial: yes
verbose: yes
interface_resolution: 1920x1080
/TRUEOS
protocol: limine
# NOTE: On hybrid ISO->USB setups, firmware/USB tools often place Limine's
# config on the EFI System Partition (ESP). In that case, `boot():` resolves to
# the ESP, not the ISO9660 volume, and `/TRUEOS.elf` won't be found.
#
# Our ISO uses a GPT with:
# - partition 2: ESP (efi.img)
# - partition 3: ISO9660 data (kernel lives here)
kernel_path: boot(3):/TRUEOS.elf
module_path: boot():/EFI/BOOT/BOOTX64.EFI
module_string: trueos.install.bootx64
