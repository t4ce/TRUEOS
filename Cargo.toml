[package]
name = "TRUEOS"
version = "0.0.1"
edition = "2024"

[features]
default = ["gfx_virgl"]
dma_nic_fpga = []
gfx_virgl = []
gfx_intel = []


[dependencies]
x86_64 = { version = "0.15.4", default-features = false, features = ["instructions", "nightly"] }
core2 = { version = "0.4", default-features = false, features = ["alloc"] }
spin = "0.10"
embassy-executor = { version = "0.9.1", default-features = false, features = ["executor-thread", "arch-spin"] }
embassy-time = { version = "0.5.0", default-features = false, features = ["tick-hz-1_000"] }
embassy-time-driver = { version = "0.2.1", default-features = false }
heapless = { version = "0.8", default-features = false }
limine = { version = "0.5", default-features = false }
acpi = { version = "6.1.1", default-features = false, features = ["alloc", "aml"] }
aml = { version = "0.16", default-features = false }
fontdue = { version = "0.9.3", default-features = false, features = ["hashbrown"] }
rdrand = { version = "0.8", default-features = false }
getrandom = { version = "0.2", default-features = false, features = ["custom"] }
raw-cpuid = { version = "11", default-features = false }
rand_core = { version = "0.6", default-features = false }
rand_chacha = { version = "0.3", default-features = false }
zeroize = { version = "1", default-features = false }
libm = { version = "0.2", default-features = false }
hashbrown = { version = "0.16.1", default-features = false }
memchr = { version = "2.8.0", default-features = false }
twoway = { version = "0.2", default-features = false }
unicode-segmentation = { version = "1", default-features = false }
unicode-normalization = { version = "0.1", default-features = false }
log = { version = "0.4", default-features = false }
trueos-qjs = { path = "crates/trueos-qjs", features = ["trueos", "yoga-native"] }
trueos-gfx-core = { path = "crates/trueos-gfx-core", features = ["alloc"] }
rustls = { version = "0.23", default-features = false, features = ["custom-provider", "logging", "tls12"] }
rustls-rustcrypto = { version = "0.0.2-alpha", default-features = false, features = ["alloc", "logging", "tls12", "zeroize"] }
webpki-roots = { version = "1.0.6", default-features = false }
miniz_oxide = { version = "0.9", default-features = false, features = ["with-alloc"] }
png = { version = "0.18.1", default-features = false }
zune-core = { version = "0.5.1", default-features = false }
zune-jpeg = { version = "0.5.13", default-features = false }
crc32fast = { version = "1.5.0", default-features = false }
sha2 = { version = "0.10", default-features = false }
embedded-websocket = { version = "0.9.4", default-features = false }
smoltcp = { version = "0.12", default-features = false, features = ["alloc", "proto-ipv4", "proto-ipv6", "multicast", "socket-raw", "socket-udp", "socket-tcp", "socket-icmp", "socket-dhcpv4", "medium-ethernet"] }
trueos-math = { path = "crates/trueos-math", features = ["alloc"] }
trueos-fs = { path = "crates/trueos-fs" }
trueos-v = { path = "crates/trueos-v" }
trueos-tetris = { path = "crates/trueos-tetris" }
trueos-weather = { path = "crates/trueos-weather" }
lyon_geom = { version = "1.0.19", default-features = false }
lyon_tessellation = { version = "1.0.16", default-features = false }
usvg = { version = "0.45.1", default-features = false }
tiny-skia-path = { version = "0.11.4", default-features = false, features = ["no-std-float"] }
parry2d = { version = "0.25", default-features = false, features = ["dim2", "f32"] }
vp9-parser = { version = "0.3.2", default-features = false }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"
lto = "fat"
codegen-units = 1
strip = true
debug = false

[build-dependencies]
trueos-limloader = { path = "crates/trueos-limloader" }

[patch.crates-io]
flate2 = { path = "vendor/flate2-1.1.9" }
png = { path = "vendor/png-0.18.1" }
fdeflate = { path = "vendor/fdeflate-0.3.7" }
simd-adler32 = { path = "vendor/simd-adler32-0.3.8" }
num-traits = { path = "vendor/num-traits-0.2.19" }
usvg = { path = "vendor/usvg-0.45.1" }
imagesize = { path = "vendor/imagesize-0.13.0" }
kurbo = { path = "vendor/kurbo-0.11.3" }
svgtypes = { path = "vendor/svgtypes-0.15.3" }
xmlwriter = { path = "vendor/xmlwriter-0.1.0" }
crc32fast = { path = "vendor/crc32fast-1.5.0" }
vp9-parser = { path = "vendor/vp9-parser-0.3.2" }
embedded-websocket = { path = "vendor/embedded-websocket-0.9.4" }
