[package]
name = "falseos"
version = "0.0.1"
edition = "2021"

[dependencies]
embassy-executor = { path = "vendor/embassy-executor", default-features = false, features = ["executor-thread", "arch-x86_64"] }
embassy-time = { version = "0.5.0", default-features = false, features = ["tick-hz-1_000"] }
embassy-time-driver = { version = "0.2.1", default-features = false }
x86_64 = { version = "0.15.4", default-features = false, features = ["instructions", "nightly"] }
spin = "0.10"
heapless = { version = "0.8", default-features = false }
dma-api = { version = "0.5.2", default-features = false, features = ["alloc"] }
limine = { version = "0.5", default-features = false }
acpi = { version = "5", default-features = false }
font8x8 = { version = "0.3", default-features = false, features = ["unicode"] }
rdrand = { version = "0.8", default-features = false }
raw-cpuid = { version = "11", default-features = false }
libm = { version = "0.2", default-features = false }
fatfs = { git = "https://github.com/rafalh/rust-fatfs", default-features = false, features = ["alloc"] }

[profile.dev]
panic = "abort"

[profile.release]
panic = "abort"