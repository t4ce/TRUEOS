<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Pixi Calculator (Static First Pass)</title>
    <style>
      html, body { margin: 0; height: 100%; background: #111; overflow: hidden; }
      canvas { display: block; margin: 0 auto; }
    </style>
  </head>
  <body>
    <script type="module">
      import * as PIXI from "https://cdn.jsdelivr.net/npm/pixi.js@8.6.6/dist/pixi.mjs";

      // Static, fixed-size scene for first integration pass.
      const WIDTH = 640;
      const HEIGHT = 420;

      const app = new PIXI.Application();
      await app.init({
        width: WIDTH,
        height: HEIGHT,
        background: "#111111",
        antialias: true
      });
      document.body.appendChild(app.canvas);

      function makeLabel(text, x, y, size = 18, fill = 0xffffff) {
        const t = new PIXI.Text({
          text,
          style: { fill, fontSize: size, fontFamily: "monospace" }
        });
        t.x = x;
        t.y = y;
        return t;
      }

      function makePanel(x, y, w, h, fill = 0x222222, stroke = 0x666666) {
        const g = new PIXI.Graphics();
        g.roundRect(x, y, w, h, 10).fill(fill).stroke({ color: stroke, width: 2 });
        return g;
      }

      function makeButton(label, x, y, w, h) {
        const c = new PIXI.Container();
        const bg = new PIXI.Graphics();
        bg.roundRect(0, 0, w, h, 10).fill(0x2a2a2a).stroke({ color: 0x777777, width: 2 });
        const t = new PIXI.Text({
          text: label,
          style: { fill: 0xffffff, fontSize: 20, fontFamily: "monospace" }
        });
        t.anchor.set(0.5);
        t.x = w / 2;
        t.y = h / 2;
        c.x = x;
        c.y = y;
        c.addChild(bg, t);
        return c;
      }

      function makeInputBox(x, y, w, h, placeholder) {
        const c = new PIXI.Container();
        const bg = new PIXI.Graphics();
        bg.roundRect(0, 0, w, h, 10).fill(0x1b1b1b).stroke({ color: 0x666666, width: 2 });
        const t = new PIXI.Text({
          text: placeholder,
          style: { fill: 0x888888, fontSize: 20, fontFamily: "monospace" }
        });
        t.x = 12;
        t.y = (h - 20) / 2;
        c.x = x;
        c.y = y;
        c.addChild(bg, t);
        return c;
      }

      const root = new PIXI.Container();
      app.stage.addChild(root);

      const uiW = 560;
      const uiH = 360;
      root.x = (WIDTH - uiW) / 2;
      root.y = (HEIGHT - uiH) / 2;

      root.addChild(makePanel(0, 0, uiW, uiH));
      root.addChild(makeLabel("Pixi Calculator (static scene)", 20, 18, 18));

      root.addChild(makeLabel("A:", 20, 60, 18));
      root.addChild(makeLabel("B:", 20, 110, 18));

      root.addChild(makeInputBox(70, 50, 470, 42, "input A (disabled in first pass)"));
      root.addChild(makeInputBox(70, 100, 470, 42, "input B (disabled in first pass)"));

      root.addChild(makeLabel("Output:", 20, 168, 18));
      root.addChild(makeLabel("Result rendering only (logic disabled)", 20, 198, 18, 0xcccccc));

      const btnY = 282;
      const btnW = 70;
      const btnH = 44;
      const gap = 12;
      const startX = 20;
      root.addChild(makeButton("+", startX + 0 * (btnW + gap), btnY, btnW, btnH));
      root.addChild(makeButton("-", startX + 1 * (btnW + gap), btnY, btnW, btnH));
      root.addChild(makeButton("*", startX + 2 * (btnW + gap), btnY, btnW, btnH));
      root.addChild(makeButton("/", startX + 3 * (btnW + gap), btnY, btnW, btnH));
      root.addChild(makeButton("Clear A", startX + 4 * (btnW + gap), btnY, 120, btnH));
      root.addChild(makeButton("Clear B", startX + 4 * (btnW + gap), btnY + btnH + 10, 120, btnH));
    </script>
  </body>
</html>
