      if (mime.includes("markdown") || name.endsWith(".md")) return "file-text";
      if (mime.includes("css") || name.endsWith(".css")) return "palette";
      if (mime.includes("yaml") || name.endsWith(".yaml") || name.endsWith(".yml")) return "file-cog";
      return "file";
    }

    function fileColor(node) {
      const mime = node.mime || "";
      const name = node.name || "";
      if (mime.includes("image")) return "text-fuchsia-700";
      if (name.endsWith(".rs")) return "text-orange-700";
      if (name.match(/\.(js|ts|tsx|jsx)$/)) return "text-amber-700";
      if (mime.includes("markdown")) return "text-cyan-700";
      if (mime.includes("css")) return "text-emerald-700";
      return "text-stone-500";
    }

    function mimeFromName(name) {
      if (name.endsWith(".json")) return "application/json";
      if (name.endsWith(".md")) return "text/markdown";
      if (name.endsWith(".rs")) return "text/rust";
      if (name.match(/\.(ts|tsx)$/)) return "text/typescript";
      if (name.endsWith(".js")) return "text/javascript";
      if (name.endsWith(".css")) return "text/css";
      if (name.endsWith(".yaml") || name.endsWith(".yml")) return "text/yaml";
      if (name.match(/\.(png|jpg|jpeg|webp|gif)$/)) return "image";
      return "application/octet-stream";
    }

    function mockOpenText(node) {
      const path = pathString(node.id);
      if ((node.mime || "").startsWith("image/")) {
        return `Binary preview opened as text, best effort.\n\n${path}\n${"\\u0000PNG\\r\\n\\u001a\\n".repeat(8)}`;
      }
      if (node.name.endsWith(".json") || node.mime === "application/json") {
        return JSON.stringify({ name: node.name, path, size: node.size, modified: node.modified }, null, 2);
      }
      return [
        `# ${node.name}`,
        "",
        `Path: ${path}`,
        `MIME: ${node.mime || "application/octet-stream"}`,
        `Size: ${formatSize(node.size || 0)}`,
        "",
        "Mock adapter text body. Attach the Axum backend to load TRUEOSFS file bytes."
      ].join("\n");
    }

    function formatSize(bytes = 0) {
      const units = ["B", "KB", "MB", "GB", "TB"];
      let value = Number(bytes || 0);
      let index = 0;
      while (value >= 1024 && index < units.length - 1) {
        value /= 1024;
        index += 1;
      }
      return `${value.toFixed(value >= 10 || index === 0 ? 0 : 1)} ${units[index]}`;
    }

    function formatDate(value) {
      if (!value) return "";
      return new Intl.DateTimeFormat(undefined, { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" }).format(new Date(value));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function escapeAttr(value) {
      return escapeHtml(value);
    }

    function escapeJs(value) {
      return String(value ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
    }

    function createHttpAdapter(base = "/api") {
      async function json(path, options = {}) {
        const response = await fetch(`${base}${path}`, {
          headers: { "content-type": "application/json", ...(options.headers || {}) },
          ...options
        });
        if (!response.ok) throw new Error(await response.text());
        return response.json();
      }
      return {
        loadTree: () => json("/tree"),
        replaceTree: root => json("/tree", { method: "PUT", body: JSON.stringify({ root }) }),
        createNode: (parentId, node) => json("/nodes", { method: "POST", body: JSON.stringify({ parentId, ...node }) }),
        updateNode: (nodeId, patch) => json(`/nodes/${encodeURIComponent(nodeId)}`, { method: "PATCH", body: JSON.stringify(patch) }),
        deleteNodes: ids => json("/nodes/delete", { method: "POST", body: JSON.stringify({ ids }) }),
        moveNodes: (ids, targetParentId, position = null) => json("/nodes/move", { method: "POST", body: JSON.stringify({ ids, targetParentId, position }) }),
        uploadFile: (parentId, file) => fetch(`${base}/nodes/${encodeURIComponent(parentId)}/upload`, {
          method: "POST",
          headers: { "x-file-name": encodeURIComponent(file.name) },
          body: file
        }).then(async response => {
          if (!response.ok) throw new Error(await response.text());
          return response.json();
        }),
        downloadUrl: nodeId => `${base}/nodes/${encodeURIComponent(nodeId)}/download`,
        openText: async nodeId => {
          const response = await fetch(`${base}/nodes/${encodeURIComponent(nodeId)}/content`);
          if (!response.ok) throw new Error(await response.text());
          return response.text();
        },
        job: id => json(`/jobs/${encodeURIComponent(id)}`),
        events: () => new EventSource(`${base}/jobs/events`)
      };
    }

    window.FileExplorer = {
      schema: NODE_SCHEMA_VERSION,
      getTree: () => clone(state.tree),
      setTree: tree => {
        state.tree = normalizeTree(clone(tree));
        state.currentId = state.tree.id;
        state.activeId = state.tree.id;
        state.selected.clear();
        state.expanded = new Set([state.tree.id]);
        render();
      },
      replaceTreeAsync: tree => enqueueJob({
        kind: "replace",
        label: "Replace tree",
        description: "Loading snapshot",
        nodeIds: [state.tree.id],
        stages: ["Loading snapshot", "Validating schema", "Swapping tree"],
        apply: () => {
          state.tree = normalizeTree(clone(tree));
          state.currentId = state.tree.id;
          state.activeId = state.tree.id;
          state.selected.clear();
        }
      }),
      enqueuePatch: ({ label, nodeIds, apply }) => enqueueJob({
        kind: "patch",
        label,
        description: "Applying server patch",
        nodeIds,
        stages: ["Receiving patch", "Applying patch", "Refreshing view"],
        apply
      }),
      createHttpAdapter,
      attachBackend: async (base = "/api") => {
        const adapter = createHttpAdapter(base);
        const snapshot = await adapter.loadTree();
        state.adapter = adapter;
        window.FileExplorer.setTree(snapshot.root || snapshot);
        state.adapterName = "http";
        render();
        return adapter;
      }
    };

    document.addEventListener("click", event => {
      if (!event.target.closest(".tile, .list-row, .tree-row, button, input, select, nav")) {
        state.selected.clear();
        state.activeId = state.currentId;
        render();
      }
    });

    document.addEventListener("keydown", event => {
      const tag = document.activeElement?.tagName?.toLowerCase();
      if (["input", "textarea", "select"].includes(tag)) return;
      if (event.key === "Delete" || event.key === "Backspace") {
        event.preventDefault();
        deleteSelected();
      }
      if (event.key === "F2") {
        event.preventDefault();
        renameSelected();
      }
      if ((event.metaKey || event.ctrlKey) && event.key.toLowerCase() === "a") {
        event.preventDefault();
        const current = getNode(state.currentId);
        state.selected = new Set((current.children || []).map(node => node.id));
        render();
      }
      if (event.key === "Escape") {
        state.context = null;
        state.modal = null;
        state.renamingId = null;
        render();
      }
    });

    window.addEventListener("load", () => {
      render();
      if (window.FILE_EXPLORER_API_BASE) {
        window.FileExplorer.attachBackend(window.FILE_EXPLORER_API_BASE).catch(error => {
          state.adapterName = "mock";
          toast(`Backend unavailable: ${error.message || error}`);
          render();
        });
      }
    });
  </script>
</body>
</html>
