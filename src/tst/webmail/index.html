<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRUEOS Webmail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "Segoe UI", "sans-serif"],
            mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular", "Consolas", "monospace"]
          },
          boxShadow: {
            soft: "0 10px 35px rgba(15, 23, 42, 0.09)"
          }
        }
      }
    };
  </script>
  <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <style>
    :root {
      --surface: #f7f7f4;
      --ink: #171717;
      --muted: #68645f;
      --line: #dedbd3;
      --accent: #047857;
      --accent-2: #0e7490;
      --danger: #b91c1c;
      --queue-height: 280px;
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: #b9b5aa transparent;
    }

    body {
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.72), rgba(247, 247, 244, 0.94)),
        var(--surface);
      color: var(--ink);
    }

    button, input, textarea {
      font: inherit;
    }

    .app-shell {
      display: grid;
      grid-template-columns: minmax(300px, 370px) minmax(0, 1fr) minmax(290px, 330px);
      grid-template-rows: 58px minmax(0, 1fr);
      min-height: 100vh;
    }

    .icon-btn,
    .message-row,
    .queue-row {
      transition: border-color 120ms ease, background 120ms ease, color 120ms ease, transform 120ms ease;
    }

    .message-row[aria-selected="true"] {
      border-color: rgba(4, 120, 87, 0.42);
      background: rgba(4, 120, 87, 0.09);
      box-shadow: inset 0 0 0 1px rgba(4, 120, 87, 0.15);
    }

    .icon-btn:hover,
    .message-row:hover,
    .queue-row:hover {
      background: rgba(255, 255, 255, 0.82);
    }

    .icon-btn:active {
      transform: translateY(1px);
    }

    .queue-drawer {
      height: var(--queue-height);
      transform: translateY(calc(100% - 44px));
    }

    .queue-drawer[data-open="true"] {
      transform: translateY(0);
    }

    .progress-bar {
      background:
        linear-gradient(90deg, rgba(4, 120, 87, 0.9), rgba(14, 116, 144, 0.9));
    }

    @media (max-width: 1120px) {
      .app-shell {
        grid-template-columns: minmax(280px, 350px) minmax(0, 1fr);
      }

      .inspector-panel {
        display: none;
      }
    }

    @media (max-width: 760px) {
      .app-shell {
        display: block;
      }

      .mail-list-panel {
        height: 320px;
      }

      .queue-drawer {
        left: 8px !important;
        right: 8px !important;
      }
    }
  </style>
</head>
<body class="overflow-hidden font-sans antialiased">
  <div id="app"></div>
  <div id="toast-root" class="fixed right-4 top-4 z-[80] flex w-[min(380px,calc(100vw-2rem))] flex-col gap-2"></div>
  <script src="./app.js"></script>
</body>
</html>
