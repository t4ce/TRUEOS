<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TRUEOS Webmail</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ["Inter", "ui-sans-serif", "system-ui", "Segoe UI", "sans-serif"],
            mono: ["JetBrains Mono", "ui-monospace", "SFMono-Regular", "Consolas", "monospace"]
          },
          boxShadow: {
            soft: "0 10px 35px rgba(15, 23, 42, 0.09)"
          }
        }
      }
    };
  </script>
  <script defer src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <link rel="stylesheet" href="/tailwind.css">
</head>
<body data-app="webmail" class="overflow-hidden font-sans antialiased">
  <div id="app"></div>
  <div id="toast-root" class="fixed right-4 top-4 z-[80] flex w-[min(380px,calc(100vw-2rem))] flex-col gap-2"></div>
  <script src="./app.js"></script>
</body>
</html>
