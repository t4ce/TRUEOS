  <title>TRUEOS Dependency Graph</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --hot: #1b78a6;
      --paper: #f6f8fb;
    }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font: 14px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .viewport {
      overflow: scroll;
      padding: 18px;
      width: 100vw;
      height: 100vh;
      cursor: grab;
      scrollbar-gutter: stable both-edges;
      user-select: none;
      overscroll-behavior: contain;
    }
    .viewport.is-panning,
    .viewport.is-panning * {
      cursor: grabbing;
    }
    #graph {
      display: block;
      width: 34165.0px;
      max-width: none;
      height: auto;
      background: white;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.14);
      transform-origin: top left;
    }
    @keyframes rootPulse {
      0%, 100% { fill: rgba(27, 120, 166, 0.06); }
      50% { fill: rgba(27, 120, 166, 0.25); }
    }
    .root-hotspot rect {
      fill: rgba(27, 120, 166, 0.06);
      stroke: transparent;
      stroke-width: 3;
      pointer-events: all;
      animation: rootPulse 3.2s ease-in-out infinite;
      transition: fill 120ms ease, stroke 120ms ease;
    }
    .root-hotspot:hover rect,
    .root-hotspot:focus rect {
      animation: none;
      fill: rgba(27, 120, 166, 0.25);
      stroke: var(--hot);
    }
    dialog {
      width: 95vw;
      height: 95vh;
      max-width: 95vw;
      max-height: 95vh;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: white;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.32);
      overflow: hidden;
    }
    dialog::backdrop {
      background: rgba(15, 23, 42, 0.32);
    }
    #close-dialog {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid #b9c5d3;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }
    #dialog-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }
  </style>
</head>

  <dialog id="root-dialog">
    <button id="close-dialog" type="button" aria-label="Close">&times;</button>
    <iframe id="dialog-frame" title="Root dependency graph"></iframe>
  </dialog>
  <script>
    const viewport = document.querySelector('.viewport');
    const graph = document.getElementById('graph');
    const dialog = document.getElementById('root-dialog');
    const frame = document.getElementById('dialog-frame');
    const closeButton = document.getElementById('close-dialog');
    const dragThreshold = 4;
    const minGraphScale = 0.15;
    const maxGraphScale = 4;
    const graphBaseWidth = Number.parseFloat(graph.getAttribute('width'));
    const graphBaseHeight = Number.parseFloat(graph.getAttribute('height'));
    let graphScale = 1;
    let pointerId = null;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragStartLeft = 0;
    let dragStartTop = 0;
    let didDrag = false;

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function setGraphScale(nextScale) {
      graphScale = clamp(nextScale, minGraphScale, maxGraphScale);
      graph.style.width = `${graphBaseWidth * graphScale}px`;
      graph.style.height = `${graphBaseHeight * graphScale}px`;
    }

    function normalizeWheelDelta(event) {
      const multiplier = event.deltaMode === WheelEvent.DOM_DELTA_LINE
        ? 16
        : event.deltaMode === WheelEvent.DOM_DELTA_PAGE
          ? viewport.clientHeight
          : 1;

      return {
        x: event.deltaX * multiplier,
        y: event.deltaY * multiplier,
      };
    }

    viewport.addEventListener('pointerdown', (event) => {
      if (event.button !== 0) {
        return;
      }

      pointerId = event.pointerId;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      dragStartLeft = viewport.scrollLeft;
      dragStartTop = viewport.scrollTop;
      didDrag = false;
      viewport.setPointerCapture(pointerId);
      viewport.classList.add('is-panning');
    });

    viewport.addEventListener('pointermove', (event) => {
      if (event.pointerId !== pointerId) {
        return;
      }

      const deltaX = event.clientX - dragStartX;
      const deltaY = event.clientY - dragStartY;
      if (Math.abs(deltaX) > dragThreshold || Math.abs(deltaY) > dragThreshold) {
        didDrag = true;
      }

      if (didDrag) {
        event.preventDefault();
        viewport.scrollLeft = dragStartLeft - deltaX;
        viewport.scrollTop = dragStartTop - deltaY;
      }
    });

    function endDrag(event) {
      if (event.pointerId !== pointerId) {
        return;
      }

      viewport.releasePointerCapture(pointerId);
      viewport.classList.remove('is-panning');
      pointerId = null;
    }

    viewport.addEventListener('pointerup', endDrag);
    viewport.addEventListener('pointercancel', endDrag);

    viewport.addEventListener('click', (event) => {
      if (!didDrag) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      didDrag = false;
    }, true);

    viewport.addEventListener('wheel', (event) => {
      event.preventDefault();

      const delta = normalizeWheelDelta(event);
      if (!event.ctrlKey && !event.metaKey) {
        viewport.scrollLeft += event.shiftKey && delta.x === 0 ? delta.y : delta.x;
        viewport.scrollTop += event.shiftKey && delta.x === 0 ? 0 : delta.y;
        return;
      }

      const rect = viewport.getBoundingClientRect();
      const style = getComputedStyle(viewport);
      const paddingLeft = Number.parseFloat(style.paddingLeft) || 0;
      const paddingTop = Number.parseFloat(style.paddingTop) || 0;
      const pointerX = event.clientX - rect.left;
      const pointerY = event.clientY - rect.top;
      const graphX = (viewport.scrollLeft + pointerX - paddingLeft) / graphScale;
      const graphY = (viewport.scrollTop + pointerY - paddingTop) / graphScale;

      setGraphScale(graphScale * Math.exp(-delta.y * 0.001));
      viewport.scrollLeft = paddingLeft + graphX * graphScale - pointerX;
      viewport.scrollTop = paddingTop + graphY * graphScale - pointerY;
    }, { passive: false });

    setGraphScale(1);

    document.querySelectorAll('.root-hotspot').forEach((link) => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        frame.src = link.getAttribute('href');
        dialog.showModal();
      });
    });

    closeButton.addEventListener('click', () => {
      dialog.close();
    });

    dialog.addEventListener('close', () => {
      frame.removeAttribute('src');
    });
  </script>
