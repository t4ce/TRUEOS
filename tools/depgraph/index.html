<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TRUEOS Dependency Graph</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --hot: #1b78a6;
      --paper: #f6f8fb;
    }
    * { box-sizing: border-box; }
    html,
    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font: 14px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .viewport {
      overflow: scroll;
      padding: 18px;
      width: 100vw;
      height: 100vh;
      cursor: grab;
      scrollbar-gutter: stable both-edges;
      user-select: none;
      overscroll-behavior: contain;
    }
    .viewport.is-panning,
    .viewport.is-panning * {
      cursor: grabbing;
    }
    #graph {
      display: block;
      width: 40302.0px;
      max-width: none;
      height: auto;
      background: white;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.14);
      transform-origin: top left;
    }
    #plasma-wave {
      position: fixed;
      inset: 0;
      z-index: 3;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
      mix-blend-mode: screen;
    }
    .control-panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 4;
      width: min(320px, calc(100vw - 32px));
      padding: 14px 16px 16px;
      border: 1px solid rgba(139, 155, 176, 0.42);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.94);
      box-shadow: 0 16px 44px rgba(15, 23, 42, 0.16);
      backdrop-filter: blur(10px);
      opacity: 0.25;
      transition: opacity 140ms ease;
    }
    .control-panel:hover,
    .control-panel:focus-within {
      opacity: 1;
    }
    .control-title {
      margin: 0 0 12px;
      font-size: 18px;
      line-height: 1.15;
      font-weight: 750;
      color: var(--ink);
    }
    .zoom-control {
      display: grid;
      gap: 6px;
    }
    .zoom-control label {
      font-size: 12px;
      font-weight: 700;
      color: #475569;
    }
    #zoom-slider {
      width: 100%;
      accent-color: var(--hot);
    }
    @keyframes rootPulse {
      0%, 100% { fill: rgba(27, 120, 166, 0.06); }
      50% { fill: rgba(27, 120, 166, 0.25); }
    }
    .root-hotspot rect {
      fill: rgba(27, 120, 166, 0.06);
      stroke: transparent;
      stroke-width: 7.2;
      pointer-events: all;
      animation: rootPulse 3.2s ease-in-out infinite;
      transition: fill 120ms ease, stroke 120ms ease;
    }
    .root-hotspot:hover rect,
    .root-hotspot:focus rect {
      animation: none;
      fill: rgba(27, 120, 166, 0.25);
      stroke: var(--hot);
    }
    dialog {
      width: 95vw;
      height: 95vh;
      max-width: 95vw;
      max-height: 95vh;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: white;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.32);
      overflow: hidden;
    }
    dialog::backdrop {
      background: rgba(15, 23, 42, 0.32);
    }
    #close-dialog {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid #b9c5d3;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }
    #dialog-image {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center center;
      background: white;
    }
  </style>
</head>

  <dialog id="root-dialog">
    <button id="close-dialog" type="button" aria-label="Close">&times;</button>
    <img id="dialog-image" alt="Root dependency graph">
  </dialog>
  <script>
    const viewport = document.querySelector('.viewport');
    const graph = document.getElementById('graph');
    const dialog = document.getElementById('root-dialog');
    const dialogImage = document.getElementById('dialog-image');
    const closeButton = document.getElementById('close-dialog');
    const zoomSlider = document.getElementById('zoom-slider');
    const plasmaCanvas = document.getElementById('plasma-wave');
    const plasmaCtx = plasmaCanvas.getContext('2d');
    const dragThreshold = 4;
    const maxGraphScale = 0.8;
    const graphBaseWidth = Number.parseFloat(graph.getAttribute('width'));
    const graphBaseHeight = Number.parseFloat(graph.getAttribute('height'));
    const rootFocusX = 8906.39;
    const rootFocusY = 9311.76;
    let graphScale = 1;
    let pointerId = null;
    let dragStartX = 0;
    let dragStartY = 0;
    let dragStartLeft = 0;
    let dragStartTop = 0;
    let didDrag = false;

    function clamp(value, min, max) {
      return Math.min(Math.max(value, min), max);
    }

    function minGraphScale() {
      const style = getComputedStyle(viewport);
      const paddingX = (Number.parseFloat(style.paddingLeft) || 0)
        + (Number.parseFloat(style.paddingRight) || 0);
      const paddingY = (Number.parseFloat(style.paddingTop) || 0)
        + (Number.parseFloat(style.paddingBottom) || 0);
      const fitWidth = Math.max(0.01, (viewport.clientWidth - paddingX) / graphBaseWidth);
      const fitHeight = Math.max(0.01, (viewport.clientHeight - paddingY) / graphBaseHeight);
      return Math.min(maxGraphScale, Math.max(fitWidth, fitHeight));
    }

    function setGraphScale(nextScale) {
      graphScale = clamp(nextScale, minGraphScale(), maxGraphScale);
      graph.style.width = `${graphBaseWidth * graphScale}px`;
      graph.style.height = `${graphBaseHeight * graphScale}px`;
      zoomSlider.min = minGraphScale().toFixed(4);
      zoomSlider.max = String(maxGraphScale);
      zoomSlider.value = graphScale.toFixed(4);
    }

    function setGraphScaleAroundViewportPoint(nextScale, pointerX, pointerY) {
      const style = getComputedStyle(viewport);
      const paddingLeft = Number.parseFloat(style.paddingLeft) || 0;
      const paddingTop = Number.parseFloat(style.paddingTop) || 0;
      const graphX = (viewport.scrollLeft + pointerX - paddingLeft) / graphScale;
      const graphY = (viewport.scrollTop + pointerY - paddingTop) / graphScale;

      setGraphScale(nextScale);
      viewport.scrollLeft = paddingLeft + graphX * graphScale - pointerX;
      viewport.scrollTop = paddingTop + graphY * graphScale - pointerY;
    }

    function graphPointToViewportPoint(graphX, graphY) {
      const rect = viewport.getBoundingClientRect();
      const style = getComputedStyle(viewport);
      const paddingLeft = Number.parseFloat(style.paddingLeft) || 0;
      const paddingTop = Number.parseFloat(style.paddingTop) || 0;
      return {
        x: rect.left + paddingLeft + graphX * graphScale - viewport.scrollLeft,
        y: rect.top + paddingTop + graphY * graphScale - viewport.scrollTop,
      };
    }

    function resizePlasmaCanvas() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      plasmaCanvas.width = Math.ceil(window.innerWidth * dpr);
      plasmaCanvas.height = Math.ceil(window.innerHeight * dpr);
      plasmaCanvas.style.width = `${window.innerWidth}px`;
      plasmaCanvas.style.height = `${window.innerHeight}px`;
      plasmaCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return { width: window.innerWidth, height: window.innerHeight };
    }

    function plasmaNoise(angle, t, seed) {
      return (
        Math.sin(angle * 5.0 + t * 10.5 + seed) * 0.55
        + Math.sin(angle * 11.0 - t * 7.0 + seed * 1.7) * 0.28
        + Math.sin(angle * 23.0 + t * 13.0 + seed * 0.4) * 0.17
      );
    }

    function drawPlasmaRing(ctx, origin, radius, progress, hue, alpha, width) {
      const steps = 220;
      const roughness = Math.max(8, radius * 0.026);
      ctx.beginPath();
      for (let index = 0; index <= steps; index += 1) {
        const angle = (Math.PI * 2 * index) / steps;
        const wobble = plasmaNoise(angle, progress, hue * 0.01) * roughness;
        const micro = Math.sin(index * 1.91 + progress * 31) * roughness * 0.18;
        const r = Math.max(0, radius + wobble + micro);
        const x = origin.x + Math.cos(angle) * r;
        const y = origin.y + Math.sin(angle) * r;
        if (index === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      }
      ctx.closePath();
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.shadowBlur = width * 2.8;
      ctx.shadowColor = `hsla(${hue}, 100%, 67%, ${alpha})`;
      ctx.strokeStyle = `hsla(${hue}, 100%, 66%, ${alpha})`;
      ctx.lineWidth = width;
      ctx.stroke();
      ctx.shadowBlur = 0;
    }

    function playPlasmaWave() {
      if (!plasmaCtx) {
        return;
      }
      const origin = graphPointToViewportPoint(rootFocusX, rootFocusY);
      const duration = 3900;
      const start = performance.now();
      const bounds = resizePlasmaCanvas();
      const maxRadius = Math.hypot(
        Math.max(origin.x, bounds.width - origin.x),
        Math.max(origin.y, bounds.height - origin.y),
      ) + 120;

      function frame(now) {
        const t = clamp((now - start) / duration, 0, 1);
        const eased = 1 - Math.pow(1 - t, 3);
        plasmaCtx.clearRect(0, 0, bounds.width, bounds.height);
        plasmaCtx.globalCompositeOperation = 'lighter';

        const bloom = plasmaCtx.createRadialGradient(
          origin.x,
          origin.y,
          Math.max(0, maxRadius * (eased - 0.08)),
          origin.x,
          origin.y,
          Math.max(1, maxRadius * (eased + 0.16)),
        );
        bloom.addColorStop(0, `rgba(36, 214, 255, ${0.12 * (1 - t)})`);
        bloom.addColorStop(0.38, `rgba(137, 92, 255, ${0.10 * (1 - t)})`);
        bloom.addColorStop(0.72, `rgba(255, 255, 255, ${0.05 * (1 - t)})`);
        bloom.addColorStop(1, 'rgba(255, 255, 255, 0)');
        plasmaCtx.fillStyle = bloom;
        plasmaCtx.fillRect(0, 0, bounds.width, bounds.height);

        const pulse = Math.sin(t * Math.PI);
        [
          { delay: 0.00, hue: 190, width: 22, alpha: 0.34 },
          { delay: 0.035, hue: 265, width: 14, alpha: 0.24 },
          { delay: 0.075, hue: 178, width: 7, alpha: 0.42 },
          { delay: 0.115, hue: 305, width: 4, alpha: 0.26 },
        ].forEach((layer) => {
          const p = clamp((t - layer.delay) / (1 - layer.delay), 0, 1);
          const r = maxRadius * (1 - Math.pow(1 - p, 2.7));
          drawPlasmaRing(
            plasmaCtx,
            origin,
            r,
            t,
            layer.hue,
            layer.alpha * pulse * (1 - p * 0.35),
            layer.width,
          );
        });

        for (let index = 0; index < 36; index += 1) {
          const angle = index * 2.399963 + t * 0.9;
          const lane = 0.78 + 0.2 * Math.sin(index * 4.17);
          const r = maxRadius * eased * lane;
          const x = origin.x + Math.cos(angle) * r;
          const y = origin.y + Math.sin(angle) * r;
          const sparkAlpha = Math.max(0, 0.22 * pulse - t * 0.08);
          plasmaCtx.fillStyle = `rgba(190, 245, 255, ${sparkAlpha})`;
          plasmaCtx.beginPath();
          plasmaCtx.arc(x, y, 1.4 + 3.2 * (1 - t), 0, Math.PI * 2);
          plasmaCtx.fill();
        }

        plasmaCtx.globalCompositeOperation = 'source-over';
        if (t < 1) {
          requestAnimationFrame(frame);
        } else {
          plasmaCtx.clearRect(0, 0, bounds.width, bounds.height);
        }
      }

      requestAnimationFrame(frame);
    }

    function normalizeWheelDelta(event) {
      const multiplier = event.deltaMode === WheelEvent.DOM_DELTA_LINE
        ? 16
        : event.deltaMode === WheelEvent.DOM_DELTA_PAGE
          ? viewport.clientHeight
          : 1;

      return {
        x: event.deltaX * multiplier,
        y: event.deltaY * multiplier,
      };
    }

    viewport.addEventListener('pointerdown', (event) => {
      if (event.button !== 0) {
        return;
      }
      if (event.target.closest('.root-hotspot')) {
        return;
      }

      pointerId = event.pointerId;
      dragStartX = event.clientX;
      dragStartY = event.clientY;
      dragStartLeft = viewport.scrollLeft;
      dragStartTop = viewport.scrollTop;
      didDrag = false;
      viewport.setPointerCapture(pointerId);
      viewport.classList.add('is-panning');
    });

    viewport.addEventListener('pointermove', (event) => {
      if (event.pointerId !== pointerId) {
        return;
      }

      const deltaX = event.clientX - dragStartX;
      const deltaY = event.clientY - dragStartY;
      if (Math.abs(deltaX) > dragThreshold || Math.abs(deltaY) > dragThreshold) {
        didDrag = true;
      }

      if (didDrag) {
        event.preventDefault();
        viewport.scrollLeft = dragStartLeft - deltaX;
        viewport.scrollTop = dragStartTop - deltaY;
      }
    });

    function endDrag(event) {
      if (event.pointerId !== pointerId) {
        return;
      }

      viewport.releasePointerCapture(pointerId);
      viewport.classList.remove('is-panning');
      pointerId = null;
    }

    viewport.addEventListener('pointerup', endDrag);
    viewport.addEventListener('pointercancel', endDrag);

    viewport.addEventListener('click', (event) => {
      if (!didDrag) {
        return;
      }

      event.preventDefault();
      event.stopPropagation();
      didDrag = false;
    }, true);

    viewport.addEventListener('wheel', (event) => {
      event.preventDefault();

      const delta = normalizeWheelDelta(event);
      if (!event.ctrlKey && !event.metaKey) {
        viewport.scrollLeft += event.shiftKey && delta.x === 0 ? delta.y : delta.x;
        viewport.scrollTop += event.shiftKey && delta.x === 0 ? 0 : delta.y;
        return;
      }

      const rect = viewport.getBoundingClientRect();
      const pointerX = event.clientX - rect.left;
      const pointerY = event.clientY - rect.top;

      setGraphScaleAroundViewportPoint(graphScale * Math.exp(-delta.y * 0.001), pointerX, pointerY);
    }, { passive: false });

    zoomSlider.addEventListener('input', () => {
      setGraphScaleAroundViewportPoint(
        Number.parseFloat(zoomSlider.value),
        viewport.clientWidth / 2,
        viewport.clientHeight / 2,
      );
    });

    window.addEventListener('resize', () => {
      setGraphScale(graphScale);
    });

    setGraphScale(minGraphScale());
    requestAnimationFrame(playPlasmaWave);

    document.querySelectorAll('.root-hotspot').forEach((link) => {
      link.addEventListener('click', (event) => {
        event.preventDefault();
        dialogImage.src = link.getAttribute('href');
        dialogImage.alt = link.getAttribute('aria-label') || 'Root dependency graph';
        dialog.showModal();
      });
    });

    closeButton.addEventListener('click', () => {
      dialog.close();
    });

    dialog.addEventListener('close', () => {
      dialogImage.removeAttribute('src');
    });
  </script>
