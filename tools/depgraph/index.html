  <title>TRUEOS Dependency Graph</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --hot: #1b78a6;
      --paper: #f6f8fb;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--ink);
      background: var(--paper);
      font: 14px/1.4 Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .viewport {
      overflow: auto;
      padding: 18px;
      min-height: 100vh;
    }
    #graph {
      display: block;
      width: 3411.0px;
      max-width: none;
      height: auto;
      background: white;
      box-shadow: 0 1px 3px rgba(15, 23, 42, 0.14);
      transform-origin: top left;
    }
    @keyframes rootPulse {
      0%, 100% { fill: rgba(27, 120, 166, 0.06); }
      50% { fill: rgba(27, 120, 166, 0.25); }
    }
    .root-hotspot rect {
      fill: rgba(27, 120, 166, 0.06);
      stroke: transparent;
      stroke-width: 3;
      pointer-events: all;
      animation: rootPulse 3.2s ease-in-out infinite;
      transition: fill 120ms ease, stroke 120ms ease;
    }
    .root-hotspot:hover rect,
    .root-hotspot:focus rect {
      animation: none;
      fill: rgba(27, 120, 166, 0.25);
      stroke: var(--hot);
    }
    dialog {
      width: 95vw;
      height: 95vh;
      max-width: 95vw;
      max-height: 95vh;
      padding: 0;
      border: 0;
      border-radius: 8px;
      background: white;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.32);
      overflow: hidden;
    }
    dialog::backdrop {
      background: rgba(15, 23, 42, 0.32);
    }
    #close-dialog {
      position: absolute;
      top: 8px;
      right: 8px;
      z-index: 1;
      display: grid;
      place-items: center;
      width: 32px;
      height: 32px;
      border: 1px solid #b9c5d3;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.92);
      color: var(--ink);
      font-size: 22px;
      line-height: 1;
      cursor: pointer;
    }
    #dialog-frame {
      width: 100%;
      height: 100%;
      border: 0;
      background: white;
    }
  </style>
</head>

    document.querySelectorAll('.root-hotspot').forEach((link) => {
