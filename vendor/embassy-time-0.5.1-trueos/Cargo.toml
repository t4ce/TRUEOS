[package]
name = "embassy-time"
version = "0.5.1"
edition = "2024"
description = "TRUEOS-local slim Embassy time facade without embedded-hal delay impls"
documentation = "https://docs.embassy.dev/embassy-time"
readme = "README.md"
categories = ["embedded", "no-std", "concurrency", "asynchronous"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/embassy-rs/embassy"

[features]
default = []
defmt = ["dep:defmt"]
tick-hz-1_000 = ["embassy-time-driver/tick-hz-1_000"]

[lib]
name = "embassy_time"
path = "src/lib.rs"

[dependencies.defmt]
version = "1.0.1"
optional = true

[dependencies.embassy-time-driver]
version = "0.2.2"

[dependencies.futures-core]
version = "0.3.31"
default-features = false
