[package]
name = "lumen"
version = "0.1.5"
edition = "2024"
autobins = false
build = "build.rs"

[features]
default = []
dev-tools = []
arm64-int8-kernels = []
x86-int8-kernels = []
arm64-fp-kernels = []
x86-fp-kernels = []
cuda = []

[dependencies]
ndarray = { version = "0.15", features = ["rayon"] }
ndarray-rand = "0.14"
rand_distr = "0.4"
rayon = "1.7"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
bincode = "1.3"
image = "0.24" 
tokenizers = "0.19"
safetensors = "0.3"
memmap2 = "0.5"
half = "2.3"
mimalloc = "0.1"

[profile.release]
opt-level = 3       # 最高优化等级
lto = true          # 开启链接时优化
panic = "abort"     # 发生 panic 直接终止
strip = true        # 去除符号表

[[bin]]
name = "lumen"
path = "src/main.rs"

[[bin]]
name = "quantize_safetensors"
path = "src/bin/quantize_safetensors.rs"

[[bin]]
name = "kernel_bench"
path = "src/bin/kernel_bench.rs"
required-features = ["dev-tools"]

[[bin]]
name = "prefill_decode_bench"
path = "src/bin/prefill_decode_bench.rs"
required-features = ["dev-tools"]

[[bin]]
name = "cuda_cpu_bench"
path = "src/bin/cuda_cpu_bench.rs"
required-features = ["dev-tools"]
