[package]
edition = "2024"
name = "embassy-executor"
version = "0.10.0"
build = "build.rs"
description = "async/await executor designed for embedded usage"
documentation = "https://docs.embassy.dev/embassy-executor"
readme = "README.md"
categories = [
    "embedded",
    "no-std",
    "asynchronous",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/embassy-rs/embassy"

[features]
_any_trace = []
_platform = []
defmt = ["dep:defmt"]
embassy-time-driver = ["dep:embassy-time-driver"]
executor-thread = []
log = ["dep:log"]
metadata-name = ["embassy-executor-macros/metadata-name"]
nightly = ["embassy-executor-macros/nightly"]
platform-spin = ["_platform"]
rtos-trace = [
    "_any_trace",
    "metadata-name",
    "dep:rtos-trace",
    "embassy-time-driver",
]
scheduler-deadline = []
scheduler-priority = []
trace = ["_any_trace"]
turbowakers = []

[lib]
name = "embassy_executor"
path = "src/lib.rs"

[dependencies.cordyceps]
version = "0.3.4"
features = ["no-cache-pad"]

[dependencies.critical-section]
version = "1.1"

[dependencies.defmt]
version = "1.0.1"
optional = true

[dependencies.document-features]
version = "0.2.7"

[dependencies.embassy-executor-macros]
version = "0.8.0"

[dependencies.embassy-executor-timer-queue]
version = "0.1"

[dependencies.embassy-time-driver]
version = "0.2.1"
optional = true

[dependencies.log]
version = "0.4.14"
optional = true

[dependencies.rtos-trace]
version = "0.2"
optional = true
