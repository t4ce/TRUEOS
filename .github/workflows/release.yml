name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: Optional release version without the leading v. Empty uses 0.0.<tools/cnt>.
        required: false
        default: ""
        type: string
      publish_release:
        description: Publish or update the GitHub Release
        required: true
        default: false
        type: boolean

concurrency:
  group: trueos-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-sign-release:
    name: Build, sign, and publish
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: 1

    steps:
      - name: Checkout source
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Checkout required submodules
        shell: bash
        run: |
          set -euo pipefail
          git submodule update --init \
            crates/trueos-shader \
            vendor/CrabUSB \
            vendor/limine \
            vendor/tinyaudio

      - name: Install build dependencies
        shell: bash
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y \
            autoconf \
            automake \
            build-essential \
            dosfstools \
            gcc \
            git \
            libasound2-dev \
            linux-firmware \
            mtools \
            nasm \
            ovmf \
            p7zip-full \
            pkg-config \
            python3-cryptography \
            xorriso \
            zstd

      - name: Install Rust nightly toolchain
        shell: bash
        run: |
          set -euo pipefail
          rustup toolchain install nightly \
            --profile minimal \
            --component rust-src,rustfmt,clippy,llvm-tools-preview

      - name: Locate firmware and OVMF
        id: paths
        shell: bash
        run: |
          set -euo pipefail

          ovmf_path="$(find /usr/share -type f \( -name OVMF_CODE.fd -o -name OVMF_CODE_4M.fd -o -name OVMF.fd \) | sort | head -n 1)"
          if [[ -z "${ovmf_path}" ]]; then
            echo "Could not find OVMF firmware from the ovmf package" >&2
            exit 1
          fi

          guc_path="$(find /lib/firmware /usr/lib/firmware -type f \( -name adlp_guc_70.bin -o -name adlp_guc_70.bin.zst \) 2>/dev/null | sort | head -n 1 || true)"
          if [[ -z "${guc_path}" ]]; then
            echo "Could not find Intel ADL-P GuC firmware. Install linux-firmware or provide it in the runner image." >&2
            exit 1
          fi

          huc_path="$(find /lib/firmware /usr/lib/firmware -type f \( -name tgl_huc.bin -o -name tgl_huc.bin.zst \) 2>/dev/null | sort | head -n 1 || true)"

          echo "ovmf=${ovmf_path}" >> "${GITHUB_OUTPUT}"
          echo "guc=${guc_path}" >> "${GITHUB_OUTPUT}"
          echo "huc=${huc_path}" >> "${GITHUB_OUTPUT}"

      - name: Build release bundle
        shell: bash
        run: |
          set -euo pipefail
          make release \
            START_BAREMETAL_LOG=0 \
            PUBLISH_RELEASE_SMB=0 \
            OVMF_BUNDLE_PATH="${{ steps.paths.outputs.ovmf }}" \
            GUC_FW_HOST_PATH="${{ steps.paths.outputs.guc }}" \
            HUC_FW_HOST_PATH="${{ steps.paths.outputs.huc }}"

      - name: Resolve release version
        id: version
        shell: bash
        env:
          INPUT_VERSION: ${{ inputs.version || '' }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          elif [[ -n "${INPUT_VERSION}" ]]; then
            version="${INPUT_VERSION}"
            tag="v${version}"
          else
            release_counter="$(tr -d '[:space:]' < tools/cnt 2>/dev/null || true)"
            if ! [[ "${release_counter}" =~ ^[0-9]+$ ]]; then
              echo "Could not derive release version: tools/cnt is missing or not numeric" >&2
              exit 1
            fi
            version="0.0.${release_counter}"
            tag="v${version}"
          fi

          if [[ -z "${version}" || "${version}" == "v" ]]; then
            echo "Release version is empty" >&2
            exit 1
          fi

          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"

      - name: Stage release assets
        id: assets
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          dist="dist"
          mkdir -p "${dist}"

          cp bld/TrueOS.7z "${dist}/TrueOS-${version}.7z"
          cp bld/trueos-release/TRUEOS.provenance.json "${dist}/TRUEOS-${version}.provenance.json"
          if [[ -f bld/trueos-release/TRUEOS.source-files.sha256 ]]; then
            cp bld/trueos-release/TRUEOS.source-files.sha256 "${dist}/TRUEOS-${version}.source-files.sha256"
          fi

          (
            cd "${dist}"
            sha256sum TrueOS-${version}.7z TRUEOS-${version}.provenance.json $([[ -f TRUEOS-${version}.source-files.sha256 ]] && printf '%s' TRUEOS-${version}.source-files.sha256) > SHA256SUMS
          )

          archive_name="TrueOS-${version}.7z"
          archive_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/releases/download/v${version}/${archive_name}"
          archive_sha256="$(sha256sum "${dist}/${archive_name}" | cut -d ' ' -f1)"
          record_sha256="$(python3 -c 'import json; print(json.load(open("bld/trueos-release/TRUEOS.provenance.json", encoding="utf-8"))["record_sha256"])')"
          iso_sha256="$(python3 -c 'import json; data=json.load(open("bld/trueos-release/TRUEOS.provenance.json", encoding="utf-8")); print(data["artifacts"]["iso"]["sha256"])')"

          cat > "${dist}/release-notes.md" <<EOF
          ## Download

          [Download ${archive_name}](${archive_url})

          <sub>

          | item | sha256 |
          | --- | --- |
          | release bundle | \`${archive_sha256}\` |
          | ISO inside bundle | \`${iso_sha256}\` |
          | provenance record | \`${record_sha256}\` |

          Source commit: \`${GITHUB_SHA}\`

          Assets are signed with the TRUEOS Ed25519 release key. Verify \`SHA256SUMS\` and the \`.trueos-sig.json\` signatures before using the release bundle.

          </sub>
          EOF

          echo "dist=${dist}" >> "${GITHUB_OUTPUT}"

      - name: Install TRUEOS release key
        id: release-key
        shell: bash
        env:
          TRUEOS_RELEASE_ED25519_KEY: ${{ secrets.TRUEOS_RELEASE_ED25519_KEY }}
        run: |
          set -euo pipefail

          if [[ -z "${TRUEOS_RELEASE_ED25519_KEY}" ]]; then
            echo "Missing required secret TRUEOS_RELEASE_ED25519_KEY" >&2
            exit 1
          fi

          key_path="${RUNNER_TEMP}/trueos-release-ed25519-key.json"
          printf '%s' "${TRUEOS_RELEASE_ED25519_KEY}" > "${key_path}"
          chmod 600 "${key_path}"

          key_id="$(python3 -c 'import json, sys; print(json.load(open(sys.argv[1], encoding="utf-8"))["id"])' "${key_path}")"
          echo "key_path=${key_path}" >> "${GITHUB_OUTPUT}"
          echo "key_id=${key_id}" >> "${GITHUB_OUTPUT}"

      - name: Sign release assets
        shell: bash
        env:
          TRUEOS_RELEASE_KEY_PATH: ${{ steps.release-key.outputs.key_path }}
        run: |
          set -euo pipefail

          dist="${{ steps.assets.outputs.dist }}"
          export TRUEOS_RELEASE_DIST="${dist}"

          python3 - <<'PY'
          import base64
          import hashlib
          import json
          import os
          from pathlib import Path

          from cryptography.hazmat.primitives.asymmetric import ed25519

          def b64u(data):
              return base64.urlsafe_b64encode(data).decode("ascii").rstrip("=")

          def b64u_decode(text):
              return base64.urlsafe_b64decode(text + "=" * (-len(text) % 4))

          key_path = Path(os.environ["TRUEOS_RELEASE_KEY_PATH"])
          dist = Path(os.environ["TRUEOS_RELEASE_DIST"])
          key_data = json.loads(key_path.read_text(encoding="utf-8"))

          public = {
              "schema": "trueos-ed25519-public-key-v1",
              "algorithm": "ed25519",
              "id": key_data["id"],
              "public_key": key_data["public_key"],
          }
          (dist / "TRUEOS-release-public-key.json").write_text(
              json.dumps(public, indent=2, sort_keys=True) + "\n",
              encoding="utf-8",
          )

          private_key = ed25519.Ed25519PrivateKey.from_private_bytes(
              b64u_decode(key_data["private_key"])
          )

          skip = {"TRUEOS-release-public-key.json", "release-notes.md"}
          for path in sorted(dist.iterdir()):
              if not path.is_file() or path.name in skip or path.name.endswith(".trueos-sig.json"):
                  continue
              payload = path.read_bytes()
              signature = {
                  "schema": "trueos-ed25519-signature-v1",
                  "algorithm": "ed25519",
                  "key_id": key_data["id"],
                  "public_key": key_data["public_key"],
                  "file": path.name,
                  "sha256": hashlib.sha256(payload).hexdigest(),
                  "signature": b64u(private_key.sign(payload)),
              }
              Path(str(path) + ".trueos-sig.json").write_text(
                  json.dumps(signature, indent=2, sort_keys=True) + "\n",
                  encoding="utf-8",
              )
          PY

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: trueos-release-${{ steps.version.outputs.version }}
          path: |
            dist/*
            !dist/release-notes.md
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.publish_release == true)
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          mapfile -d '' release_assets < <(find dist -maxdepth 1 -type f ! -name 'release-notes.md' -print0 | sort -z)
          if [[ "${#release_assets[@]}" -eq 0 ]]; then
            echo "No release assets were staged" >&2
            exit 1
          fi

          if gh release view "${TAG}" >/dev/null 2>&1; then
            is_draft="$(gh release view "${TAG}" --json isDraft --jq '.isDraft')"
            if [[ "${is_draft}" == "true" ]]; then
              gh release upload "${TAG}" "${release_assets[@]}" --clobber
              gh release edit "${TAG}" \
                --draft=false \
                --title "TRUEOS ${VERSION}" \
                --notes-file dist/release-notes.md
            else
              mapfile -t existing_assets < <(gh release view "${TAG}" --json assets --jq '.assets[].name' | sort)
              declare -A existing_asset_names=()
              for asset_name in "${existing_assets[@]}"; do
                existing_asset_names["${asset_name}"]=1
              done

              missing_assets=()
              for asset in "${release_assets[@]}"; do
                asset_name="$(basename "${asset}")"
                if [[ -z "${existing_asset_names[${asset_name}]+x}" ]]; then
                  missing_assets+=("${asset_name}")
                fi
              done

              if [[ "${#missing_assets[@]}" -ne 0 ]]; then
                printf 'Release %s is already published and is missing expected immutable asset(s):\n' "${TAG}" >&2
                printf '  %s\n' "${missing_assets[@]}" >&2
                echo "Create a new release tag, or delete/recreate the release before immutability is enabled." >&2
                exit 1
              fi

              echo "Release ${TAG} is already published with all expected assets; leaving immutable release unchanged."
            fi
          else
            gh release create "${TAG}" \
              --draft \
              --target "${GITHUB_SHA}" \
              --title "TRUEOS ${VERSION}" \
              --notes-file dist/release-notes.md
            gh release upload "${TAG}" "${release_assets[@]}"
            gh release edit "${TAG}" --draft=false
          fi
